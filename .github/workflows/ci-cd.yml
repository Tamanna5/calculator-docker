name: CI/CD Pipeline for MERN Application

on:
  push:
    branches:
      - main  # Run workflow on push to main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18.x' # Adjust version if needed

      - name: Install Dependencies
        run: |
          cd client
          npm install
          cd ../server
          npm install

      - name: Run Tests
        run: |
          cd server
          npm test

      - name: Build Client (React app)
        run: |
          cd client
          npm run build

      - name: Deploy to Local Server via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "$SSH_PRIVATE_KEY" | ssh-add -
          ssh -o StrictHostKeyChecking=no your_user@your_server_ip << 'EOF'
            cd /path/to/your/app  # Path to the app on the local server
            git pull origin main   # Pull latest changes from the GitHub repo
            cd client && npm install && npm run build  # Rebuild React app
            cd ../server && npm install  # Install server dependencies
            pm2 restart all  # Restart the Node.js app using PM2
          EOF
